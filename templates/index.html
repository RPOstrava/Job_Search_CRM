<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Search CRM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ url_for('index') }}" class="nav-brand">💼 Job Search CRM</a>
            <a href="{{ url_for('add_application') }}" class="btn btn-primary">+ Přidat žádost</a>
        </div>
    </nav>
    <main class="container content">
        
        <!-- Obsah hlavní stránky -->
        <div class="dashboard-header">
            <h1>Moje žádosti o práci</h1>
            
            <form method="GET" action="{{ url_for('index') }}" class="filter-form">
                <label for="status">Filtrovat podle stavu:</label>
                <select name="status" id="status" onchange="this.form.submit()">
                    <option value="">-- Všechny --</option>
                    {% for status in statuses %}
                        <option value="{{ status }}" {% if current_filter == status %}selected{% endif %}>{{ status }}</option>
                    {% endfor %}
                </select>
            </form>
        </div>

        <table class="app-table">
            <thead>
                <tr>
                    <th>Firma</th>
                    <th>Pozice</th>
                    <th>Stav</th>
                    <th>Datum odeslání</th>
                    <th>Akce</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applications %}
                <tr>
                    <td><strong>{{ app['company'] }}</strong></td>
                    <td>{{ app['position'] }}</td>
                    <td><span class="status-badge {{ app['status']|lower }}">{{ app['status'] }}</span></td>
                    <td>{{ app['sent_date'] }}</td>
                    <td>
                        <a href="{{ url_for('edit_application', id=app['id']) }}" class="btn btn-sm btn-edit">Upravit</a>
                        <form action="{{ url_for('delete_application', id=app['id']) }}" method="POST" style="display:inline;" onsubmit="return confirm('Opravdu smazat?');">
                            <button type="submit" class="btn btn-sm btn-delete">Smazat</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="5" style="text-align: center;">Nenalezeny žádné žádosti.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </main>
</body>
</html>
