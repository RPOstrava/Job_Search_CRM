<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přidat žádost - Job Search CRM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ url_for('index') }}" class="nav-brand">💼 Job Search CRM</a>
            <a href="{{ url_for('add_application') }}" class="btn btn-primary">+ Přidat žádost</a>
        </div>
    </nav>
    <main class="container content">

        <!-- Obsah formuláře pro přidání -->
        <div class="form-card">
            <h2>Přidat novou žádost</h2>
            <form method="POST">
                <div class="form-group">
                    <label for="company">Firma:</label>
                    <input type="text" id="company" name="company" required placeholder="Např. Google">
                </div>
                <div class="form-group">
                    <label for="position">Pozice:</label>
                    <input type="text" id="position" name="position" required placeholder="Např. Python Developer">
                </div>
                <div class="form-group">
                    <label for="status">Stav:</label>
                    <select id="status" name="status">
                        {% for status in statuses %}
                            <option value="{{ status }}">{{ status }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="sent_date">Datum odeslání:</label>
                    <input type="date" id="sent_date" name="sent_date" value="{{ today }}" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Uložit žádost</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Zpět</a>
                </div>
            </form>
        </div>

    </main>
</body>
</html>
